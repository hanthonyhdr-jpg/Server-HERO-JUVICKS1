<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Assinador Digital</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body
    style="display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle at center, #1e1b4b, #0f172a);">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <div class="header" style="margin-bottom: 2rem;">
            <h1 style="font-size: 1.8rem;">Acesso Administrativo</h1>
            <p style="color: var(--text-muted)">Entre com suas credenciais</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.85rem; text-align: center;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="post">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="username" class="input-field" placeholder="Digite seu usuário" required
                    autofocus>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" class="input-field" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">
                ENTRAR NO PAINEL
            </button>
        </form>

        <p style="text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 2rem;">
            Sistema de Assinatura Protegido &copy; 2026
        </p>
    </div>
</body>

</html>
